<div class="container mt-3">
    <div class="card shadow-sm border">
        <div class="card-body">
            <h2>Task List</h2>

            <div class="mb-3">
                <label class="form-label visually-hidden" for="taskSearch">Search tasks</label>
                <input
                    id="taskSearch"
                    type="search"
                    class="form-control"
                    placeholder="Search here..."
                    [(ngModel)]="searchQuery"
                    name="taskSearch"
                />
            </div>

            <table class="table table-striped table-hover">
            <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Actions</th>
            </tr>
            <tr *ngFor="let task of filteredTasks">
                <td>{{ task.title }}</td>
                <td>
                <span class="badge bg-info">{{ task.status }}</span>
                </td>
                <td>
                <span class="badge bg-warning">{{ task.priority }}</span>
                </td>
                <td>
                <button class="btn btn-success btn-sm" (click)="toggleStatus(task.id)">Toggle</button>
                <a [routerLink]="['/tasks', task.id]" class="btn btn-primary btn-sm">View</a>
                </td>
            </tr>
            </table>

            <a routerLink="/tasks/new" class="btn btn-success mb-2">Add Task</a>
  
        </div>
    </div>
</div>
